{{/* layouts/partials/feedback.html */}}
<script>
  const POST_SLUG     = {{ .File.BaseFileName | jsonify }};
  const POST_TITLE    = {{ .Title | jsonify }};
  const POST_CATEGORY = {{ index .Params.categories 0 | default "Daily" | jsonify }};
  const POST_TAGS     = {{ .Params.tags | jsonify }};

  const SUPABASE_URL  = "https://lgkmgzbunvmdmphrgxzu.supabase.co";
  const SUPABASE_KEY  = "sb_publishable_qhl2It20w0_h-NdyMZbgoA_nBkIvW0t";
</script>

<div id="feedback-widget" style="
  margin: 2rem 0;
  padding: 1.2rem 1.5rem;
  border-top: 2px solid #dc3545;
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.95rem;
">
  <span style="color: #888;">这篇文章对您有用吗？</span>

  <button id="btn-like" onclick="submitFeedback('like')" style="
    background: none;
    border: 1px solid #28a745;
    color: #28a745;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  ">👍 有用</button>

  <button id="btn-dislike" onclick="submitFeedback('dislike')" style="
    background: none;
    border: 1px solid #dc3545;
    color: #dc3545;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  ">👎 没用</button>

  <span id="feedback-msg" style="color: #888; display: none;"></span>
</div>

<script>
  const voteKey = `vote_${POST_SLUG}`;
  const existingVote = localStorage.getItem(voteKey);
  if (existingVote) {
    showDone(existingVote);
  }

  async function submitFeedback(vote) {
    if (localStorage.getItem(voteKey)) return;

    localStorage.setItem(voteKey, vote);
    showDone(vote);

    try {
      await fetch(`${SUPABASE_URL}/rest/v1/post_feedback`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({
          slug:     POST_SLUG,
          title:    POST_TITLE,
          category: POST_CATEGORY,
          tags:     POST_TAGS,
          vote:     vote
        })
      });
    } catch (e) {
      console.error("Feedback failed:", e);
    }
  }

  function showDone(vote) {
    document.getElementById("btn-like").style.display    = "none";
    document.getElementById("btn-dislike").style.display = "none";
    const msg = document.getElementById("feedback-msg");
    msg.style.display = "inline";
    msg.textContent = vote === "like" ? "✅ 感谢您的反馈！" : "📝 感谢！我们会优化内容。";
  }
</script>
