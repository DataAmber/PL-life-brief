name: Deploy Hugo Site to GitHub Pages

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches:
      - main
  # Allow manual execution from the Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping intermediate runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: Compiles Markdown into static HTML
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for Git-based features (e.g., lastmod)

      - name: Setup Hugo Environment
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true # Required for SCSS compilation in 'newsroom' theme

      - name: Initialize Theme
        # Clone the newsroom theme repository into the themes directory
        # This bypasses the need for Git Submodules during the POC phase
        run: |
          mkdir -p themes
          git clone https://github.com/onweru/newsroom themes/newsroom

      - name: Execute Hugo Build
        # Minify output to optimize performance for users in Poland
        run: hugo --minify

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deploy job: Uploads the artifact to GitHub Pages infrastructure
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
